<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Empire, Unified Pipeline Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13; --card: #18181e; --card-hi: #1f1f27; --border: #2a2a33;
    --text: #eeeef2; --muted: #8d8d9c; --accent: #e63946; --accent-soft: rgba(230,57,70,0.15);
    --green: #5fd896; --red: #f2697a; --yellow: #ffd60a; --blue: #6fa8f5;
    --shadow: 0 1px 2px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; max-width: 100%; overflow-x: hidden; }
  body { font-family: "Inter", -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 20px 16px 48px; -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 1280px; margin: 0 auto; }
  .display { font-family: "Bebas Neue", "Inter", sans-serif; letter-spacing: 0.03em; }
  h1.display { font-size: 32px; margin: 0 0 4px; }
  .subtitle { color: var(--muted); font-size: 13px; margin: 0 0 24px; }

  .channels { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  @media (max-width: 980px) { .channels { grid-template-columns: 1fr; } }

  /* min-width: 0 overrides the grid item's default min-width: auto,
     without it, a long unbreakable child (the run-item links below,
     white-space: nowrap) forces the card wider than the grid track
     instead of actually being clipped by text-overflow: ellipsis
     (confirmed broken on mobile 2026-07-09: status pills pushed off the
     right edge of the viewport, horizontal scroll on the whole page). */
  .channel-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 18px; box-shadow: var(--shadow); display: flex; flex-direction: column; min-width: 0; }
  .channel-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .channel-name { font-size: 19px; font-weight: 800; }
  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .live-dot.on { background: var(--green); box-shadow: 0 0 0 0 rgba(95,216,150,0.6); animation: pulse-dot 2s infinite; }
  @keyframes pulse-dot { 0% { box-shadow: 0 0 0 0 rgba(95,216,150,0.55); } 70% { box-shadow: 0 0 0 6px rgba(95,216,150,0); } 100% { box-shadow: 0 0 0 0 rgba(95,216,150,0); } }
  .channel-link { font-size: 11px; color: var(--muted); text-decoration: none; margin-bottom: 14px; display: inline-block; }
  .channel-link:hover { color: var(--accent); }

  .run-box { background: var(--card-hi); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 12px; font-size: 12px; }
  .run-title { font-weight: 600; margin-bottom: 6px; color: var(--text); }
  .idle-note { color: var(--muted); font-size: 12px; padding: 4px 2px; }

  .agent-row { display: flex; align-items: center; gap: 8px; padding: 3px 0; font-size: 12px; }
  .agent-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
  .agent-dot.done { background: var(--green); }
  .agent-dot.running { background: var(--accent); animation: pulse-dot 1.6s infinite; }
  .agent-dot.error { background: var(--red); }
  .agent-name { color: var(--muted); min-width: 60px; }
  .agent-detail { color: var(--text); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  h3.section-label { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin: 4px 0 8px; font-weight: 700; }
  .run-list { display: flex; flex-direction: column; gap: 6px; flex: 1; }
  .run-item { display: flex; justify-content: space-between; gap: 8px; font-size: 12px; padding: 7px 9px; background: var(--card-hi); border-radius: 8px; border: 1px solid var(--border); }
  /* min-width: 0 is required for a flex child with white-space: nowrap +
     text-overflow: ellipsis to actually truncate instead of forcing the
     row (and its ancestors) wider than the viewport. */
  .run-item a, .run-item span:first-child { color: var(--text); text-decoration: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
  .run-item a:hover { color: var(--accent); }
  .status-pill { font-size: 10px; font-weight: 700; text-transform: uppercase; padding: 2px 7px; border-radius: 10px; flex-shrink: 0; }
  .pill-live, .pill-published, .pill-done { background: rgba(95,216,150,0.15); color: var(--green); }
  .pill-scheduled, .pill-pending, .pill-awaiting_images { background: rgba(255,214,10,0.15); color: var(--yellow); }
  .pill-failed { background: rgba(242,105,122,0.15); color: var(--red); }
  .empty { color: var(--muted); font-size: 12px; padding: 8px 0; }

  .refresh-note { text-align: center; color: var(--muted); font-size: 11px; margin-top: 24px; }
</style>
</head>
<body>
<div class="wrap">
  <h1 class="display">CONTENT EMPIRE</h1>
  <div class="subtitle">Status gabungan 3 channel &middot; auto-refresh tiap 60 detik</div>

  <div class="channels" id="channels">
    <div class="channel-card"><div class="empty">Memuat Golden Child Stories...</div></div>
    <div class="channel-card"><div class="empty">Memuat Apophenia...</div></div>
    <div class="channel-card"><div class="empty">Memuat Narava...</div></div>
  </div>

  <div class="refresh-note">Dibaca langsung dari repo public masing-masing channel, tidak ada server/database di tengah.</div>
</div>

<script>
  const bust = () => `?_=${Date.now()}`;
  async function fetchJSON(url, fallback = null) {
    try {
      const res = await fetch(url + bust(), { cache: "no-store" });
      if (!res.ok) return fallback;
      return await res.json();
    } catch (e) { return fallback; }
  }
  function esc(s) { return (s || "").toString().replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

  // ---- Golden Child Stories: stage-based status.json + stories.json ----
  async function renderGoldenChild() {
    const RAW = "https://raw.githubusercontent.com/tezarps/revenge-pipeline/main";
    const [status, storiesData] = await Promise.all([
      fetchJSON(`${RAW}/status.json`),
      fetchJSON(`${RAW}/stories.json`),
    ]);
    // Both requests failed (raw.githubusercontent.com rate limits fairly
    // aggressively, seen directly 2026-07-09): signal "no update this
    // cycle" so refreshAll keeps the previous successful card instead of
    // replacing it with an empty one.
    if (!status && !storiesData) return null;
    const stories = ((storiesData && storiesData.stories) || []).slice().reverse();
    const isRunning = status && status.run_state === "running";

    let runHtml = "";
    if (isRunning && status.stage) {
      const st = (status.stages || {})[status.stage];
      runHtml = `<div class="run-box"><div class="run-title">#${status.story_id}: ${esc((status.premise||"").slice(0,70))}...</div>
        <div class="agent-row"><span class="agent-dot running"></span><span class="agent-name">${esc(st ? st.label : status.stage)}</span><span class="agent-detail">${esc(st ? st.detail : "")}</span></div></div>`;
    } else {
      runHtml = `<div class="idle-note">Tidak ada run aktif.</div>`;
    }

    const now = Date.now();
    const listHtml = stories.slice(0, 8).map(s => {
      const scheduled = s.publish_at && new Date(s.publish_at).getTime() > now;
      const pill = s.status === "failed" ? "failed" : scheduled ? "scheduled" : s.status === "done" ? "live" : "pending";
      const link = s.video_id ? `https://youtube.com/watch?v=${s.video_id}` : null;
      return `<div class="run-item">
        ${link ? `<a href="${link}" target="_blank">#${s.id} ${esc((s.premise||"").slice(0,42))}...</a>` : `<span>#${s.id} ${esc((s.premise||"").slice(0,42))}...</span>`}
        <span class="status-pill pill-${pill}">${pill}</span>
      </div>`;
    }).join("") || `<div class="empty">Belum ada cerita.</div>`;

    return { name: "Golden Child Stories", link: "https://tezarps.github.io/revenge-pipeline/",
      live: isRunning, runHtml, listHtml };
  }

  // ---- Apophenia / Narava: agents-dict pipeline_status.json ----
  function renderAgentPipeline(status) {
    if (!status) return { live: false, runHtml: `<div class="idle-note">Belum ada data.</div>`, listHtml: `<div class="empty">Belum ada run.</div>` };
    const isRunning = !!status.current_run;
    const agents = status.agents || {};
    let runHtml = "";
    if (isRunning) {
      const cr = status.current_run;
      runHtml = `<div class="run-box"><div class="run-title">#${cr.topic_id}: ${esc((cr.topic||"").slice(0,70))}</div>`;
      for (const key of Object.keys(agents)) {
        const a = agents[key];
        const cls = a.status === "done" ? "done" : a.status === "running" ? "running" : a.status === "error" ? "error" : "";
        runHtml += `<div class="agent-row"><span class="agent-dot ${cls}"></span><span class="agent-name">${esc(a.name)}</span><span class="agent-detail">${esc(a.detail || a.role || "")}</span></div>`;
      }
      runHtml += `</div>`;
    } else {
      runHtml = `<div class="idle-note">Tidak ada run aktif.</div>`;
    }
    const runs = (status.runs || []).slice(0, 8);
    const listHtml = runs.map(r => {
      const pill = r.status === "published" ? "live" : r.status === "failed" ? "failed" : r.status === "awaiting_images" ? "awaiting_images" : "pending";
      const link = r.video_id ? `https://youtube.com/watch?v=${r.video_id}` : null;
      return `<div class="run-item">
        ${link ? `<a href="${link}" target="_blank">#${r.id} ${esc((r.topic||"").slice(0,42))}</a>` : `<span>#${r.id} ${esc((r.topic||"").slice(0,42))}</span>`}
        <span class="status-pill pill-${pill}">${esc(pill)}</span>
      </div>`;
    }).join("") || `<div class="empty">Belum ada run.</div>`;
    return { live: isRunning, runHtml, listHtml };
  }

  async function renderApophenia() {
    const RAW = "https://raw.githubusercontent.com/tezarps/apophenia-pipeline/main";
    const status = await fetchJSON(`${RAW}/pipeline_status.json`);
    if (!status) return null; // fetch failed this cycle, keep previous card
    const r = renderAgentPipeline(status);
    return { name: "Apophenia", link: "https://heyapophenia.vercel.app/", ...r };
  }

  async function renderNarava() {
    const RAW = "https://raw.githubusercontent.com/tezarps/narava-pipeline/main";
    const status = await fetchJSON(`${RAW}/pipeline_status.json`);
    if (!status) return null; // fetch failed this cycle, keep previous card
    const r = renderAgentPipeline(status);
    return { name: "Narava", link: "https://github.com/tezarps/narava-pipeline", ...r };
  }

  function cardHtml(c, fallbackName) {
    if (!c) {
      return `<div class="channel-card"><div class="channel-head"><div class="channel-name">${esc(fallbackName)}</div></div>
        <div class="empty">Gagal memuat (rate limit atau jaringan), coba lagi sebentar lagi.</div></div>`;
    }
    return `<div class="channel-card">
      <div class="channel-head">
        <div class="channel-name">${esc(c.name)}</div>
        <span class="live-dot ${c.live ? "on" : ""}"></span>
      </div>
      <a class="channel-link" href="${c.link}" target="_blank">${c.link.replace("https://","")} &rarr;</a>
      ${c.runHtml}
      <h3 class="section-label">Video Terbaru</h3>
      <div class="run-list">${c.listHtml}</div>
    </div>`;
  }

  // Last-known-good cache per channel: a single rate-limited fetch on one
  // channel should never blank out that channel's card if it was already
  // showing real data (confirmed as a real bug 2026-07-09 on the
  // revenge-pipeline dashboard this hub embeds the same pattern from).
  const lastCards = { gc: null, ap: null, nv: null };

  async function refreshAll() {
    const [gc, ap, nv] = await Promise.all([renderGoldenChild(), renderApophenia(), renderNarava()]);
    if (gc) lastCards.gc = gc;
    if (ap) lastCards.ap = ap;
    if (nv) lastCards.nv = nv;
    document.getElementById("channels").innerHTML = [
      cardHtml(lastCards.gc, "Golden Child Stories"),
      cardHtml(lastCards.ap, "Apophenia"),
      cardHtml(lastCards.nv, "Narava"),
    ].join("");
  }
  refreshAll();
  setInterval(refreshAll, 60000);
</script>
</body>
</html>
